<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS 图片展览馆</title>
    <style>
        :root { --bg-color: #fdfcf5; --card-bg-color: #ffffff; --text-main: #3e2723; --accent-color: #d84315; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        .header { width: 100%; max-width: 500px; padding: 30px 20px; text-align: center; }
        .header h1 { font-size: 22px; border-bottom: 2px solid var(--accent-color); display: inline-block; padding-bottom: 5px; }
        #status { font-size: 13px; color: #8d6e63; margin-top: 10px; display: block; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .item { background: var(--card-bg-color); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.3s; cursor: pointer; border: 1px solid #f0eddf; }
        .item:hover { transform: scale(1.03); }
        .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .item p { margin: 0; padding: 8px; font-size: 12px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .lightbox.show { display: flex; }
        .lightbox img { max-width: 95%; max-height: 85%; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BOSS 图片展览馆</h1>
        <small id="status">正在同步数据...</small>
    </div>

    <div class="grid" id="gallery"></div>

    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="">
    </div>

    <script>
        const username = 'kinwonnn';
        const repo = 'boss';

        async function autoLoad() {
            const gallery = document.getElementById('gallery');
            const status = document.getElementById('status');

            try {
                // 1. 尝试获取图片列表
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                if (!res.ok) throw new Error('网络请求失败');
                
                const files = await res.json();
                
                // 2. 过滤掉 index.html 这种非图片文件
                const images = files.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
                
                if (images.length === 0) {
                    status.innerText = "仓库里还没有图片哦";
                    return;
                }

                status.innerText = `已同步 ${images.length} 张珍贵照片`;

                // 3. 渲染
                images.forEach(img => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    // 使用 fastly 镜像加速图片下载
                    const imgUrl = `https://fastly.jsdelivr.net/gh/${username}/${repo}/${img.name}`;
                    
                    div.innerHTML = `
                        <img src="${imgUrl}" loading="lazy">
                        <p>${img.name.split('.')[0]}</p>
                    `;
                    
                    div.onclick = () => {
                        document.getElementById('lightbox-img').src = imgUrl;
                        document.getElementById('lightbox').classList.add('show');
                    };
                    gallery.appendChild(div);
                });

            } catch (err) {
                status.innerHTML = `<span style="color:red">加载失败：国内网络访问 GitHub API 不稳定</span><br>请尝试开启加速器或多次刷新。`;
                console.error(err);
            }
        }

        document.getElementById('lightbox').onclick = function() { this.classList.remove('show'); };
        autoLoad();
    </script>
</body>
</html>
