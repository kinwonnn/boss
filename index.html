<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS 图片展览馆</title>
    <style>
        /* --- 视觉风格大换血 --- */
        :root {
            /* 浅色、暖色调配色方案 */
            --bg-color: #fdfcf5;        /* 温暖的米色背景 (像纸张) */
            --card-bg-color: #ffffff;   /* 纯白卡片 */
            --text-main: #3e2723;       /* 深棕色主文字 (更有质感) */
            --text-sub: #8d6e63;        /* 暖灰褐色副文字 */
            --accent-color: #d84315;    /* 暖橙色点缀 (用于标题装饰) */
            --border-radius: 8px;       /* 稍微硬朗一点的圆角，更像画框 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Serif SC', serif, -apple-system, sans-serif; /* 尝试使用衬线体，更有展览馆感 */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* 顶部导航栏 (展览馆风格) */
        .header {
            width: 100%;
            max-width: 500px;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0; /* 增加一条微妙的分隔线 */
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 1px; /* 增加字间距，更有仪式感 */
            border-bottom: 2px solid var(--accent-color); /* 标题下方的暖橙色装饰线 */
            display: inline-block;
            padding-bottom: 5px;
        }

        /* 状态文字改为暖灰 */
        #status {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: normal;
        }

        /* 图片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        /* 单个卡片样式 */
        .item {
            background-color: var(--card-bg-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            /* 微妙的阴影，让卡片像漂浮在纸张上 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid #f0f0f0; /* 卡片边缘加一点浅浅的边框，更像画框 */
        }

        /* 悬停时的微妙效果 */
        .item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }

        /* 点击放大动效保留，但适配浅色背景 */
        .item:active {
            transform: scale(0.97);
        }

        /* 图片样式 */
        .item img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        /* 图片标题 */
        .item p {
            padding: 10px 12px;
            font-size: 13px;
            color: var(--text-main);
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
            font-weight: 500;
        }

        /* --- 点击放大（Lightbox）遮罩，保持深色以突出图片本身 --- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); /* 黑色高透明背景，突出图片 */
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.show {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80%;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
